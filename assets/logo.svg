<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Toolrail logo">
  <defs>
    <radialGradient id="apexGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8ab8ff" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#60a5fa" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- blue glow at the vanishing point -->
  <circle cx="50" cy="17" r="14" fill="url(#apexGlow)"/>

  <g stroke="#4ade80" stroke-width="5.5" stroke-linecap="round" fill="none" filter="url(#softGlow)">
    <!-- converging rails -->
    <path d="M47.5 16 L24 84"/>
    <path d="M52.5 16 L76 84"/>
    <!-- crossties, widening with perspective -->
    <path d="M39 42 L61 42"/>
    <path d="M33 60 L67 60"/>
    <path d="M26 78 L74 78"/>
    <!-- tie ends (small diagonals echoing the original mark) -->
    <path d="M33 60 L28.5 64.5"/>
    <path d="M67 60 L71.5 64.5"/>
    <path d="M26 78 L21.5 82.5"/>
    <path d="M74 78 L78.5 82.5"/>
  </g>
</svg>
